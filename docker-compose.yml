services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_cleaning_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    restart: unless-stopped
