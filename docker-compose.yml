services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_cleaning_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:admin@host.docker.internal:5432/ai_cleaning_db1
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:admin@host.docker.internal:5432/ai_cleaning_db1
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: datasets
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_cleaning_worker
    command: >
      celery -A celery_worker.celery_app worker
      --loglevel=info
      -Q analysis_queue,cleaning_queue,query_queue
      --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:admin@host.docker.internal:5432/ai_cleaning_db1
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:admin@host.docker.internal:5432/ai_cleaning_db1
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: datasets
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai_cleaning_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: ai_cleaning_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio_setup:
    image: minio/mc:latest
    container_name: ai_cleaning_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/datasets --ignore-existing;
      exit 0;
      "

volumes:
  redis_data:
  minio_data:
